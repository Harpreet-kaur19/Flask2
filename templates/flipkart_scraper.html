<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flipkart Shoes Scraper | Harpreet Kaur</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/flipkart_scraper.css') }}">

</head>

<body>

<div class="container">

    <h1>👟 Flipkart Shoes Web Scraper</h1>

    <p class="subtitle">
        Dynamic Web Scraping using Python, Requests and BeautifulSoup
    </p>



    <h2 class="section-title">Latest Flipkart Shoes</h2>

<div class="products-grid">

{% for shoe in shoes %}

<div class="product-card">

    <img src="{{ shoe.image }}" alt="Shoe Image">

    <h3>{{ shoe.title }}</h3>

    <p><strong>Price:</strong> {{ shoe.price }}</p>

    <p><strong>Discount:</strong> {{ shoe.discount }}</p>

    <p><strong>Size:</strong> {{ shoe.size }}</p>

</div>

{% endfor %}

</div>



    <a href="/" class="btn">⬅ Back to Portfolio</a>

</div>

</body>

</html>
