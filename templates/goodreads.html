<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Goodreads Quotes Scraper | Harpreet Kaur</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/goodreads.css') }}">

</head>

<body>

<div class="container">

    <h1>📚 Goodreads Quotes Scraper</h1>

    <p class="subtitle">
        Web Scraping using Python, Requests and BeautifulSoup
    </p>

    <table>

        <thead>

            <tr>
                <th>Quote</th>
                <th>Author</th>
                <th>Likes</th>
                <th>Tags</th>
            </tr>

        </thead>

        <tbody>

        {% for quote in quotes %}

        <tr>

            <td>{{ quote.text }}</td>

            <td>{{ quote.author }}</td>

            <td>{{ quote.likes }}</td>

            <td>{{ quote.tags }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

    <a href="/static_scraping" class="btn">
        ⬅ Back
    </a>

</div>

</body>

</html>
