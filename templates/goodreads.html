<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Goodreads Quotes Scraper | Harpreet Kaur</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/goodreads.css') }}">

</head>

<body>

<div class="container">

    <h1>📚 Goodreads Quotes Scraper</h1>

    <p class="subtitle">
        Web Scraping using Python, Requests and BeautifulSoup
    </p>

  <div class="quotes-grid">

    {% for quote in quotes %}

    <div class="quote-card">

        <div class="author-avatar">
            <i class="fas fa-user-circle"></i>
        </div>

        <p class="quote-text">
            "{{ quote.text }}"
        </p>

        <h3>{{ quote.author }}</h3>

        <p class="likes">
            ❤️ {{ quote.likes }}
        </p>

        <p class="tags">
            {{ quote.tags }}
        </p>

    </div>

    {% endfor %}

</div>

<div class="buttons">
    <a href="/static_scraping" class="btn">⬅ Back</a>
</div>

    <a href="/static_scraping" class="btn">
        ⬅ Back
    </a>

</div>

</body>

</html>
