<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JSON API Scraper</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/json_scraper.css') }}">

</head>

<body>

<div class="container">

    <h1>JSONPlaceholder API Scraper</h1>

    <p class="subtitle">
        Extracted Posts using Python Requests API
    </p>

    <table>

        <thead>

        <tr>

            <th>ID</th>
            <th>User ID</th>
            <th>Title</th>
            <th>Body</th>

        </tr>

        </thead>

        <tbody>

        {% for post in data %}

        <tr>

            <td>{{ post.id }}</td>

            <td>{{ post.userId }}</td>

            <td>{{ post.title }}</td>

            <td>{{ post.body }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

    <div class="buttons">

        <a href="/api_scraping" class="btn">← Back</a>

    </div>

</div>

</body>
</html>
